<!DOCTYPE html>

<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <title>Yatzy Turnaus - Scoreboard</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
            --inactive: #d1d8db;
            --active: #ffffff;
        }

```
    html, body { background: var(--bg); margin: 0; padding: 4px; font-family: Verdana, Geneva, sans-serif; height: 100%; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    #setup, #game-container { background: white; padding: 8px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto 20px auto; }
    
    .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
    input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; font-family: Verdana, Geneva, sans-serif; color: black; }
    
    button { color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    button:disabled { opacity: 0.5; }
    #add-btn { background: var(--accent); }
    #start-btn { width: 100%; background: #bdc3c7; margin-top: 10px; }
    #next-round-btn { width: 100%; background: var(--accent); margin: 15px 0; font-size: 1.1rem; }
    #reset-btn { background: #e74c3c; width: 100%; margin-top: 20px; opacity: 0.8; font-size: 1.1rem; }

    .table-wrapper { overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 250px; }
    th, td { border: 1px solid #bbb; padding: 5px 2px; text-align: center; font-size: 12px; }
    th { background: var(--primary); color: white; cursor: pointer; }
    
    th.active-p-header { background: #27ae60 !important; border-bottom: 3px solid #1e8449; }
    .row-label { text-align: left; padding-left: 4px; padding-right: 2px; font-weight: bold; background: #f8f9fa !important; min-width: 75px; max-width: 75px; width: 75px; position: sticky; left: 0; z-index: 5; font-size: 11px; }
    
    .col-cell { background: var(--inactive); transition: background 0.3s; }
    .active-col { background: var(--active) !important; }
    
    .score-input {
        width: 40px;
        height: 32px;
        text-align: center;
        border: 1px solid #999;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        font-family: Verdana, Geneva, sans-serif;
        background: white;
        color: black;
        -webkit-appearance: none;
    }

    /* Lukittu kenttä (ei aktiivinen pelaaja) — sama kuin single-versiossa */
    .score-input:read-only {
        background: rgba(0,0,0,0.05);
        border-color: transparent;
        color: #777;
    }
    
    .invalid { background: #ffcccc !important; border: 2px solid #e74c3c !important; color: #c0392b; }
    .total-row { background: var(--primary) !important; color: white; font-weight: bold; }
    .sum-display { font-weight: bold; color: #2980b9; }
    #history-section { border-top: 2px dashed #ccc; padding-top: 15px; margin-top: 20px; }
    .grand-total-row { background: #d5e6ed; font-weight: bold; color: var(--primary); }
    .hint { font-size: 12px; color: #7f8c8d; margin-bottom: 8px; text-align: center; font-weight: bold; }
</style>


</head>
<body>


<h2 style="text-align:center; color:var(--primary); margin-top: 10px;">Yatzy Turnaus</h2>

<div id="setup">
    <p style="margin-top: 0;">Lisää pelaajat (1-6)</p>
    <div class="input-group">
        <input type="text" id="p-name" placeholder="Pelaajan nimi" maxlength="10" onkeypress="if(event.key==='Enter') addP()">
        <button id="add-btn" onclick="addP()">Lisää</button>
    </div>
    <div id="p-list" style="margin-bottom:15px; font-weight:500; min-height: 20px;">Pelaajat: -</div>
    <button id="start-btn" onclick="start(true)" disabled>ALOITA PELI</button>
    <p style="text-align: center; margin-top: 25px;">
        <a href="https://fi.wikipedia.org/wiki/Yatzy" target="_blank" rel="noopener" style="color: #2980b9; text-decoration: underline; font-weight: 500;">Yatzy säännöt</a>
    </p>
</div>

<div id="game-container" style="display:none;">
    <div id="status-hint" class="hint">VUORO: -</div>
    <div class="table-wrapper">
        <table id="main-table">
            <thead><tr id="h-row"><th class="row-label">Kategoria</th></tr></thead>
            <tbody id="b-body"></tbody>
        </table>
    </div>
    <button id="next-round-btn" onclick="archiveRound()">Tallenna kierros &amp; Nollaa tulostaulu</button>
    <div id="history-section" style="display:none;">
        <p style="text-align:center; font-weight:bold; margin-bottom: 10px;">TURNAUKSEN KOKONAISTILANNE</p>
        <div class="table-wrapper">
            <table>
                <thead><tr id="hist-header"></tr></thead>
                <tbody id="hist-body"></tbody>
            </table>
        </div>
    </div>
    <button id="reset-btn" onclick="clearGame()">Nollaa koko peli</button>
</div>

<script>
    let players = [];
    let history = [];
    let activePlayerIndex = 0;

    const cats = [
        { id: '1', n: 'Ykköset', m: 5 }, { id: '2', n: 'Kakkoset', m: 10 },
        { id: '3', n: 'Kolmoset', m: 15 }, { id: '4', n: 'Neloset', m: 20 },
        { id: '5', n: 'Viitoset', m: 25 }, { id: '6', n: 'Kuutoset', m: 30 },
        { id: 'sum', n: 'Välisumma', r: true },
        { id: 'bon', n: 'Bonus (50)', r: true },
        { id: 'p1', n: 'Pari', min: 2, m: 12 }, { id: 'p2', n: '2 Paria', min: 6, m: 22 },
        { id: '3k', n: '3 Samaa', min: 3, m: 18 }, { id: '4k', n: '4 Samaa', min: 4, m: 24 },
        { id: 'ss', n: 'Pieni suora', f: [0, 15] }, { id: 'ls', n: 'Iso suora', f: [0, 20] },
        { id: 'fh', n: 'Täyskäsi', min: 7, m: 28 }, { id: 'ch', n: 'Sattuma', min: 5, m: 30 },
        { id: 'yz', n: 'Yatzy', f: [0, 50] },
        { id: 'tot', n: 'YHTEENSÄ', r: true, c: 'total-row' }
    ];

    // --- Tallennus ---
    function saveGame() {
        const data = { players, history, activePlayerIndex, scores: {} };
        document.querySelectorAll('.score-input').forEach(i => {
            data.scores[`${i.dataset.c}-${i.dataset.p}`] = i.value;
        });
        localStorage.setItem('YATZY_TURN_V2', JSON.stringify(data));
    }

    function loadGame() {
        try {
            const saved = localStorage.getItem('YATZY_TURN_V2');
            if (saved) {
                const data = JSON.parse(saved);
                players = data.players || [];
                history = data.history || [];
                activePlayerIndex = data.activePlayerIndex || 0;
                if (players.length > 0) {
                    start(false);
                    Object.keys(data.scores || {}).forEach(k => {
                        const parts = k.split('-');
                        const i = document.querySelector(`input[data-c="${parts[0]}"][data-p="${parts[1]}"]`);
                        if (i) i.value = data.scores[k];
                    });
                    players.forEach((_, i) => calc(i));
                    renderHistory();
                    updateUI();
                }
            }
        } catch (e) {}
    }

    function clearGame() {
        if (confirm("Nollaa kaikki?")) {
            localStorage.removeItem('YATZY_TURN_V2');
            location.reload();
        }
    }

    // --- Pelaajien lisäys ---
    function addP() {
        const el = document.getElementById('p-name');
        const name = el.value.trim().toUpperCase();
        if (name && players.length < 6) {
            players.push(name);
            el.value = '';
            document.getElementById('p-list').innerText = "Pelaajat: " + players.join(', ');
            const btn = document.getElementById('start-btn');
            btn.disabled = false;
            btn.style.background = "#2980b9";
        }
    }

    // --- Virheentarkistus (kuten single-versiossa) ---
    function hasErrors(pIdx) {
        return document.querySelectorAll(`.score-input[data-p="${pIdx}"].invalid`).length > 0;
    }

    // --- Vuoronvaihto virheen tarkistuksella (kuten single-versiossa) ---
    function setActive(index) {
        if (index === activePlayerIndex) return;
        if (hasErrors(activePlayerIndex)) {
            alert("Korjaa punainen virhe ensin!");
            return;
        }
        activePlayerIndex = index;
        updateUI();
        saveGame();
    }

    // --- Vuoron siirto kentän täytön jälkeen (sama logiikka kuin single-versiossa) ---
    function triggerNext() {
        const nextIdx = (activePlayerIndex + 1) % players.length;
        setActive(nextIdx);
    }

    // --- UI-päivitys readOnly-lukituksella (kuten single-versiossa) ---
    function updateUI() {
        const hint = document.getElementById('status-hint');
        if (hint && players[activePlayerIndex]) {
            hint.innerText = "VUORO: " + players[activePlayerIndex];
            hint.style.color = "#27ae60";
        }
        document.querySelectorAll('#h-row th').forEach((th, i) => {
            if (i > 0) th.classList.toggle('active-p-header', (i - 1) === activePlayerIndex);
        });
        document.querySelectorAll('.col-cell').forEach(td => {
            const pIdx = parseInt(td.dataset.p);
            const isActive = pIdx === activePlayerIndex;
            td.classList.toggle('active-col', isActive);

            // readOnly-lukitus — estää väärän pelaajan kentän muokkaamisen iPhonella
            const input = td.querySelector('input');
            if (input) {
                input.readOnly = !isActive;
            }
        });
    }

    // --- Taulukko rakennetaan DOM-elementeillä (kuten single-versiossa) ---
    function start(shouldSave) {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';

        const hr = document.getElementById('h-row');
        const bb = document.getElementById('b-body');
        hr.innerHTML = '<th class="row-label">Kategoria</th>';
        bb.innerHTML = '';

        // Otsikot DOM-elementeillä
        players.forEach((p, i) => {
            const th = document.createElement('th');
            th.innerText = p;
            th.onclick = () => setActive(i);
            hr.appendChild(th);
        });

        // Rivit DOM-elementeillä
        cats.forEach(cat => {
            const tr = document.createElement('tr');
            if (cat.c) tr.className = cat.c;

            const labelTd = document.createElement('td');
            labelTd.className = 'row-label';
            labelTd.innerText = cat.n;
            tr.appendChild(labelTd);

            players.forEach((_, pi) => {
                const td = document.createElement('td');
                td.className = 'col-cell';
                td.dataset.p = pi;

                if (cat.r) {
                    td.id = `r-${cat.id}-${pi}`;
                    td.innerText = '0';
                    td.classList.add('sum-display');
                } else {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.inputMode = 'numeric';
                    input.enterKeyHint = 'done';
                    input.className = 'score-input';
                    input.dataset.p = pi;
                    input.dataset.c = cat.id;

                    input.oninput = () => { calc(pi); saveGame(); };

                    // Enter sulkee näppäimistön
                    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

                    // blur = näppäimistö sulkeutui (iPhone "Done") → triggerNext
                    input.onblur = () => {
                        if (input.value !== "" && !input.readOnly) triggerNext();
                    };

                    td.appendChild(input);
                }
                tr.appendChild(td);
            });
            bb.appendChild(tr);
        });

        updateUI();
        if (shouldSave) saveGame();
    }

    // --- Laskenta ---
    function calc(pi) {
        const inputs = document.querySelectorAll(`.score-input[data-p="${pi}"]`);
        let upper = 0, total = 0;
        const upperIds = ['1', '2', '3', '4', '5', '6'];

        inputs.forEach(i => {
            const v = parseInt(i.value);
            const isBlank = i.value === "";
            const val = isBlank ? 0 : v;
            const c = cats.find(x => x.id === i.dataset.c);
            let ok = true;
            if (!isBlank) {
                if (isNaN(v) || v < 0) ok = false;
                if (c.m && v > c.m) ok = false;
                if (c.min && v < c.min && v !== 0) ok = false;
                if (c.f && !c.f.includes(v)) ok = false;
            }
            i.classList.toggle('invalid', !ok && !isBlank);
            if (ok || isBlank) {
                if (upperIds.includes(c.id)) upper += val;
                total += val;
            }
        });

        const bonus = upper >= 63 ? 50 : 0;
        const s = document.getElementById(`r-sum-${pi}`);
        const b = document.getElementById(`r-bon-${pi}`);
        const t = document.getElementById(`r-tot-${pi}`);
        if (s) s.innerText = upper;
        if (b) b.innerText = bonus;
        if (t) t.innerText = total + bonus;
    }

    // --- Kierroksen arkistointi ---
    function archiveRound() {
        if (document.querySelectorAll('.invalid').length > 0) {
            return alert("Korjaa virheet ennen tallennusta!");
        }
        const round = players.map((_, i) => parseInt(document.getElementById(`r-tot-${i}`).innerText) || 0);
        history.push(round);
        document.querySelectorAll('.score-input').forEach(i => {
            i.value = "";
            i.classList.remove('invalid');
        });
        players.forEach((_, i) => calc(i));
        activePlayerIndex = 0;
        updateUI();
        renderHistory();
        saveGame();
        window.scrollTo(0, 0);
    }

    // --- Historia-taulukko ---
    function renderHistory() {
        if (history.length === 0) return;
        document.getElementById('history-section').style.display = 'block';

        const head = document.getElementById('hist-header');
        const body = document.getElementById('hist-body');

        head.innerHTML = '<th class="row-label">Pelaaja</th>' + players.map(p => `<th>${p}</th>`).join('');

        let h = `<tr class="grand-total-row"><td class="row-label">YHTEENSÄ</td>`;
        players.forEach((_, pi) => {
            h += `<td>${history.reduce((s, r) => s + r[pi], 0)}</td>`;
        });
        h += '</tr>';

        history.forEach((r, i) => {
            h += `<tr><td class="row-label">Kierros ${i + 1}</td>` + r.map(s => `<td>${s}</td>`).join('') + '</tr>';
        });

        body.innerHTML = h;
    }

    window.onload = loadGame;
</script>


</body>
</html>
